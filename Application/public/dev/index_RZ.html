<h2>Issue Projection (Select Attributes)</h2>

<form id="projectionForm">

    <label><input type="checkbox" value="IssueID"> IssueID</label>
    <label><input type="checkbox" value="ReportTime"> ReportTime</label>
    <label><input type="checkbox" value="ConditionScore"> ConditionScore</label>
    <label><input type="checkbox" value="Description"> Description</label>
    <label><input type="checkbox" value="BikeID"> BikeID</label>
    <label><input type="checkbox" value="MaintenanceID"> MaintenanceID</label>
    <label><input type="checkbox" value="InspectorID"> InspectorID</label>

    <br><br>
    <button type="submit">Run Projection</button>
</form>

<br>
